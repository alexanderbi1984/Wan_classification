# ============================================================================
# LoRA Fine-tuning: Wan 14B DiT — Binary Classification BL1 vs PA4
# ============================================================================
# Optimized binary config applying best 5-class findings:
#   - dit_timestep=100 (noise injection for robust features)
#   - aug3 (strongest augmentation — monotonic improvement on t100)
#   - CORAL loss (dominated top of 5-class QWK rankings)
# Previous binary BL1 vs PA4 result: QWK=0.468 (with t=0, aug2, CE)
# Goal: beat SOTA to validate Wan's temporal modeling capability.
# ============================================================================

run_name: wan_lora_14B_binary_bl1pa4_t100_aug3

# ---------- Data ----------
data:
  labels_csv: /data/home/nbi1/BioVid/biovid_pain_labels.csv
  frames_root: /data/home/nbi1/BioVid/biovid_cropped_frames/
  num_classes: 2
  class_subset: [0, 4]           # BL1=0 → class 0, PA4=4 → class 1
  resize: 128
  max_frames: 129
  sample_rate: 2

# ---------- Augmentation (aug3 — best for t100 backbone) ----------
augmentation:
  hflip_prob: 0.5
  jitter_prob: 0.9              # Near-always color jitter
  jitter_brightness: 0.6
  jitter_contrast: 0.6
  jitter_saturation: 0.5
  jitter_hue: 0.2
  grayscale_prob: 0.4            # Random grayscale
  erasing_prob: 0.5              # Random erasing / cutout
  erasing_scale: [0.05, 0.45]   # Up to 45% area erased
  advanced_aug_prob: 0.7         # TrivialAugmentWide
  augmix_weight: 0.0
  augmix_severity: 4

# ---------- Model ----------
model_params:
  wan_checkpoint_dir: /data/home/nbi1/Wan_classification/Wan2.1-T2V-14B
  vae_checkpoint: /data/home/nbi1/Wan_classification/Wan2.1-T2V-14B/Wan2.1_VAE.pth
  vae_in_channels: 16
  xdit_in_channels: 5120
  feature_dim: 128
  fusion_dim: 128
  shared_mlp_hidden_dims: null
  shared_mlp_dropout: 0.5
  fusion_dropout: 0.0
  fusion_activation: relu
  fusion_use_residual: false
  fusion_use_layernorm: false
  temporal_encoder_type: gru
  temporal_encoder_nhead: 8
  temporal_encoder_num_layers: 2
  temporal_encoder_dropout: 0.2
  temporal_encoder_max_len: 512
  temporal_encoder_use_layernorm: false
  temporal_pooling_type: mean
  label_smoothing: 0.05          # Match best 5-class config
  use_distance_penalty: false
  focal_gamma: null
  dit_feature_layer: -1
  dit_timestep: 100.0            # t=100: noise injection for robust features

  # CORAL loss (best for ordinal classification from 5-class experiments)
  coral_alpha: 1.0
  ce_alpha: 0.0
  eval_head: coral

# ---------- LoRA ----------
lora_params:
  rank: 4
  alpha: 1.0
  target_modules: null
  use_gradient_checkpointing: true

# ---------- Optimizer ----------
optimizer_params:
  lr_backbone: 5.0e-5
  lr_head: 1.0e-3
  weight_decay: 0.01

# ---------- Training ----------
train:
  batch_size: 24
  num_workers: 8
  accumulate_grad_batches: 1
  max_epochs: 200
  precision: bf16-mixed
  gradient_clip_val: 1.0
  early_stop_patience: 15       # Slightly more patience for binary
  monitor_metric: val_pain_QWK
  model_summary_depth: 3
  seed: 42
  strategy: auto
